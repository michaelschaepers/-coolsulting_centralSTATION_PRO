<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>°coolROHR – Kältemittelleitung Dimensionierung</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Helvetica,Arial,sans-serif;background:#36A9E1;min-height:100vh;padding:20px}
h1{font-size:48px;font-weight:bold;color:#fff;margin-bottom:4px}
h1 span.cool{color:#fff}
h1 span.rohr{color:#3C3C3B}
.subtitle{color:rgba(255,255,255,0.85);font-size:14px;margin-bottom:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,0.13);padding:24px;margin-bottom:20px}
.card h2{color:#3C3C3B;font-size:18px;margin-bottom:16px;border-bottom:2px solid #36A9E1;padding-bottom:8px}
.card h3{color:#3C3C3B;font-size:15px;margin-bottom:10px}
label{display:block;font-size:13px;color:#3C3C3B;margin-bottom:4px;font-weight:500}
input[type=text],input[type=number],select{width:100%;padding:8px 10px;border:1.5px solid #d0d0d0;border-radius:7px;font-size:14px;outline:none;transition:border 0.2s}
input[type=text]:focus,input[type=number]:focus,select:focus{border-color:#36A9E1}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:14px}
.section-title{background:#f0f8ff;border-left:4px solid #36A9E1;padding:8px 14px;margin:16px 0 10px;border-radius:0 7px 7px 0;font-weight:600;color:#3C3C3B;font-size:14px}
.btn-calc{background:#36A9E1;color:#fff;border:none;border-radius:10px;padding:14px 40px;font-size:18px;font-weight:bold;cursor:pointer;width:100%;margin-top:18px;letter-spacing:1px;transition:background 0.2s}
.btn-calc:hover{background:#2196c9}
.result-card{background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,0.13);padding:20px;margin-bottom:16px;border-left:5px solid #36A9E1}
.result-card.warn{border-left-color:#f39c12}
.result-card.error{border-left-color:#e74c3c}
.result-card.ok{border-left-color:#27ae60}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.result-title{font-size:17px;font-weight:bold;color:#3C3C3B}
.badge{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold;margin-left:8px}
.badge-blue{background:#e8f4fd;color:#36A9E1;border:1px solid #36A9E1}
.badge-ok{background:#e8f8ef;color:#27ae60;border:1px solid #27ae60}
.badge-warn{background:#fdf5e8;color:#f39c12;border:1px solid #f39c12}
.badge-error{background:#fdecea;color:#e74c3c;border:1px solid #e74c3c}
.result-row{display:flex;flex-wrap:wrap;gap:18px;margin-bottom:8px;font-size:14px;color:#444}
.result-row span{font-weight:600;color:#3C3C3B}
.vel-bar-wrap{margin:10px 0;background:#f5f5f5;border-radius:8px;height:22px;position:relative;overflow:visible}
.vel-bar-bg{position:absolute;top:0;left:0;height:100%;background:#e0e0e0;border-radius:8px;width:100%}
.vel-bar-fill{position:absolute;top:0;left:0;height:100%;border-radius:8px;transition:width 0.4s}
.vel-bar-fill.ok{background:#27ae60}
.vel-bar-fill.warn{background:#f39c12}
.vel-bar-fill.error{background:#e74c3c}
.vel-marker{position:absolute;top:-6px;width:2px;height:34px;background:#555;border-radius:2px}
.vel-marker-label{position:absolute;top:26px;font-size:10px;color:#555;white-space:nowrap;transform:translateX(-50%)}
.vel-info{font-size:13px;color:#555;margin-top:6px}
.dp-info{font-size:13px;margin-top:6px}
.dp-ok{color:#27ae60;font-weight:600}
.dp-warn{color:#f39c12;font-weight:600}
.dp-error{color:#e74c3c;font-weight:600}
.override-row{display:flex;align-items:center;gap:8px;margin-top:10px;background:#f9f9f9;border-radius:8px;padding:8px 12px;flex-wrap:wrap}
.override-row button{background:#36A9E1;color:#fff;border:none;border-radius:6px;width:32px;height:32px;font-size:18px;cursor:pointer;font-weight:bold}
.override-row button:disabled{background:#ccc;cursor:not-allowed}
.override-current{background:#36A9E1;color:#fff;border-radius:6px;padding:4px 12px;font-size:13px;font-weight:bold}
.override-adj{background:#e8f4fd;border:1px solid #36A9E1;color:#36A9E1;border-radius:6px;padding:4px 10px;font-size:12px}
.override-manual-label{font-size:12px;color:#888;margin-left:6px}
.warning-box{border-radius:10px;padding:13px 18px;margin-bottom:10px;font-size:14px;font-weight:500}
.warning-box.red{background:#fdecea;border-left:4px solid #e74c3c;color:#c0392b}
.warning-box.orange{background:#fdf5e8;border-left:4px solid #f39c12;color:#b07d00}
.warning-box.blue{background:#e8f4fd;border-left:4px solid #36A9E1;color:#1a6fa0}
.dsr-section{background:#f8f4ff;border-radius:10px;padding:16px;margin-top:12px;border:1.5px solid #9b59b6}
.dsr-title{color:#6c3483;font-weight:bold;font-size:15px;margin-bottom:10px}
.btn-dsr{background:#9b59b6;color:#fff;border:none;border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-weight:600}
.btn-dsr:hover{background:#7d3c98}
.schema-tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.schema-tab{background:#e0e0e0;border:none;border-radius:8px 8px 0 0;padding:8px 16px;font-size:13px;cursor:pointer;font-weight:600;color:#555}
.schema-tab.active{background:#36A9E1;color:#fff}
.schema-svg-wrap{background:#f9f9f9;border-radius:0 8px 8px 8px;padding:16px;border:1px solid #ddd}
.schema-panel{display:none}
.schema-panel.active{display:block}
.dsr-detail{display:none;margin-top:14px}
.dsr-detail.open{display:block}
.slider-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.slider-row input[type=range]{flex:1}
.result-section{display:none}
.result-section.visible{display:block}
.radio-group{display:flex;gap:14px;align-items:center;margin-top:4px}
.radio-group label{display:inline;font-size:13px;font-weight:normal;margin-bottom:0}
.sync-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.sync-row input[type=checkbox]{width:auto}
.pipe-badge{background:#3C3C3B;color:#fff;border-radius:6px;padding:2px 10px;font-size:13px;font-weight:bold;margin-left:8px}
.hydro-gain{color:#27ae60;font-weight:600}
.hydro-loss{color:#e74c3c;font-weight:600}
svg text{font-family:Helvetica,Arial,sans-serif}
.form-group{margin-bottom:12px}
.header-area{margin-bottom:24px}
@media(max-width:600px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}.result-header{flex-direction:column}}
</style>
</head>
<body>
<div class="header-area">
  <h1><span class="cool">°cool</span><span class="rohr">ROHR</span></h1>
  <div class="subtitle">Kältemittelleitung Dimensionierung · coolsulting</div>
</div>

<div class="card">
  <h2>Projektdaten</h2>
  <div class="grid-3">
    <div class="form-group"><label>Projekt</label><input type="text" id="projekt" placeholder="Projektname"></div>
    <div class="form-group"><label>Kunde</label><input type="text" id="kunde" placeholder="Kundenname"></div>
    <div class="form-group"><label>Bearbeiter</label><input type="text" id="bearbeiter" placeholder="Name"></div>
  </div>
</div>

<div class="card">
  <h2>Systemparameter</h2>
  <div class="grid-4">
    <div class="form-group">
      <label>Kältemittel</label>
      <select id="refrigerant">
        <option value="R744">R744 (CO₂)</option>
        <option value="R1234yf">R1234yf</option>
        <option value="R455A">R455A</option>
        <option value="R452A">R452A</option>
        <option value="R513A">R513A</option>
        <option value="R449A" selected>R449A</option>
      </select>
    </div>
    <div class="form-group"><label>Verdampfungstemperatur t₀ (°C)</label><input type="number" id="t0" value="-10" step="1"></div>
    <div class="form-group"><label>Kondensationstemperatur tc (°C)</label><input type="number" id="tc" value="40" step="1"></div>
    <div class="form-group"><label>Kälteleistung Q₀ (kW)</label><input type="number" id="Q0" value="10" step="0.1" min="0.1"></div>
  </div>
  <div class="grid-4">
    <div class="form-group"><label>Gleichzeitigkeitsfaktor GZF</label><input type="number" id="gzf" value="1.0" step="0.05" min="0.5" max="1.0"></div>
    <div class="form-group"><label>Umgebungstemperatur T_amb (°C)</label><input type="number" id="tamb" value="30" step="1"></div>
    <div class="form-group"><label>Relative Feuchte RH (%)</label><input type="number" id="rh" value="70" step="1" min="10" max="100"></div>
  </div>
</div>

<div class="card">
  <h2>Leitungslängen &amp; Armaturen</h2>

  <div class="section-title">Saugleitung (SL)</div>
  <div class="grid-4">
    <div class="form-group"><label>Länge horizontal l_SL_h (m)</label><input type="number" id="l_SL_h" value="10" step="0.5" min="0"></div>
    <div class="form-group"><label>Länge Steig l_SL_v (m) ↑</label><input type="number" id="l_SL_v" value="3" step="0.5" min="0"></div>
    <div class="form-group"><label>Bögen 90° n_b_SL</label><input type="number" id="n_b_SL" value="4" step="1" min="0"></div>
    <div class="form-group"><label>Absperrventile n_av_SL</label><input type="number" id="n_av_SL" value="1" step="1" min="0"></div>
  </div>
  <div class="grid-4">
    <div class="form-group"><label>Magnetventile n_mv_SL</label><input type="number" id="n_mv_SL" value="0" step="1" min="0"></div>
  </div>

  <div class="section-title">Druckleitung (DL)</div>
  <div class="grid-4">
    <div class="form-group"><label>Länge horizontal l_DL_h (m)</label><input type="number" id="l_DL_h" value="0.5" step="0.5" min="0"></div>
    <div class="form-group"><label>Länge Steig l_DL_v (m) ↑</label><input type="number" id="l_DL_v" value="3" step="0.5" min="0"></div>
    <div class="form-group"><label>Bögen 90° n_b_DL</label><input type="number" id="n_b_DL" value="2" step="1" min="0"></div>
    <div class="form-group"><label>Absperrventile n_av_DL</label><input type="number" id="n_av_DL" value="1" step="1" min="0"></div>
  </div>
  <div class="grid-4">
    <div class="form-group"><label>Magnetventile n_mv_DL</label><input type="number" id="n_mv_DL" value="0" step="1" min="0"></div>
  </div>

  <div class="section-title">Flüssigkeitsleitung (FL)</div>
  <div class="grid-4">
    <div class="form-group">
      <div class="sync-row">
        <input type="checkbox" id="fl_sync" checked onchange="syncFL()">
        <label style="margin:0;font-weight:normal">= Saugleitung</label>
      </div>
      <label>Länge horizontal l_FL_h (m)</label>
      <input type="number" id="l_FL_h" value="10" step="0.5" min="0">
    </div>
    <div class="form-group">
      <label>Länge Steig l_FL_v (m)</label>
      <input type="number" id="l_FL_v" value="3" step="0.5" min="0">
      <div class="radio-group" style="margin-top:6px">
        <label><input type="radio" name="fl_dir" value="up" id="fl_up"> ↑ aufsteigend</label>
        <label><input type="radio" name="fl_dir" value="down" id="fl_down" checked> ↓ absteigend</label>
      </div>
    </div>
    <div class="form-group"><label>Bögen 90° n_b_FL</label><input type="number" id="n_b_FL" value="4" step="1" min="0"></div>
    <div class="form-group"><label>Absperrventile n_av_FL</label><input type="number" id="n_av_FL" value="1" step="1" min="0"></div>
  </div>
  <div class="grid-4">
    <div class="form-group"><label>Magnetventile n_mv_FL</label><input type="number" id="n_mv_FL" value="1" step="1" min="0"></div>
  </div>

  <div class="section-title">Kondensatleitung (KL)</div>
  <div class="grid-4">
    <div class="form-group"><label>Länge l_KL (m)</label><input type="number" id="l_KL" value="0.5" step="0.5" min="0"></div>
    <div class="form-group"><label>Bögen 90° n_b_KL</label><input type="number" id="n_b_KL" value="2" step="1" min="0"></div>
  </div>

  <button class="btn-calc" onclick="calculate()">BERECHNEN</button>
</div>

<div class="result-section" id="resultSection">
  <div id="warningsTop"></div>
  <div id="resultCards"></div>
  <div id="warningsBottom"></div>
</div>

function interpRefrig(data, T){
  const rows = data;
  if(T<=rows[0][0]) return rows[0];
  if(T>=rows[rows.length-1][0]) return rows[rows.length-1];
  for(let i=0;i<rows.length-1;i++){
    if(T>=rows[i][0]&&T<=rows[i+1][0]){
      const f=(T-rows[i][0])/(rows[i+1][0]-rows[i][0]);
      return rows[i].map((v,j)=>v+(rows[i+1][j]-v)*f);
    }
  }
  return rows[0];
}

function calcDP(rho, v, d_m, L_eq, mu_Pas){
  const Re = rho*v*d_m/mu_Pas;
  let lam;
  if(Re<1) return 0;
  if(Re<2300){lam=64/Re;}
  else{
    const x=0.0015/(3.71*d_m*1000)+5.74/Math.pow(Re,0.9);
    lam=0.25/Math.pow(Math.log10(x),2);
  }
  return lam*(L_eq/d_m)*(rho*v*v/2);
}

function getDpLimit(t0, L_total){
  const isTK = t0<=-10;
  const limits = isTK
    ? [[10,0.5],[25,1.0],[50,1.5],[75,2.0],[Infinity,2.5]]
    : [[10,1.0],[25,1.5],[50,2.0],[75,2.5],[Infinity,3.0]];
  for(const [l,k] of limits) if(L_total<=l) return k;
  return isTK?2.5:3.0;
}

function calcInsulation(d_outer_mm, T_pipe, T_amb, RH){
  const lnRH = Math.log(RH/100);
  const T_dp = 243.04*(lnRH+17.625*T_amb/(243.04+T_amb))/(17.625-lnRH-17.625*T_amb/(243.04+T_amb));
  const T_target = T_dp+1.0;
  const r_in = d_outer_mm/2;
  const h_ext = 10;
  let r_out = r_in+1;
  for(let iter=0;iter<300;iter++){
    const lam_arm = 0.036+0.00035*(T_pipe+20);
    const ln_ro_ri = Math.log(r_out/r_in);
    const T_surf = T_amb-(T_amb-T_pipe)*ln_ro_ri/(ln_ro_ri+lam_arm*h_ext*(r_out/1000));
    if(T_surf<=T_target) break;
    r_out++;
  }
  const thickness_raw = r_out-r_in;
  const std = [13,19,25,32,40,50,65];
  for(const s of std) if(s>=thickness_raw) return {thickness:s, T_dp};
  return {thickness:65, T_dp};
}

function selectPipe(mdot, rho, mu_Pas, L_h, L_v, n_bend, n_av, n_mv, vmin_h, vmin_v, vmax, gasLine, L_total, t0, dTdp, rho_v_static, l_v_static, hydroMode, offset){
  // Le factors
  const bendFac = gasLine?30:15;
  const avFac = gasLine?10:8;
  const mvFac = gasLine?30:20;

  let bestIdx=-1;
  let bestPriority=99;
  let candidates=[];

  for(let i=0;i<PIPES.length;i++){
    const [od,id]=PIPES[i];
    const d_m=id/1000;
    const A=Math.PI*d_m*d_m/4;
    const v=mdot/(rho*A);
    if(v<0) continue;
    const Le_fittings=(n_bend*bendFac+n_av*avFac+n_mv*mvFac)*d_m;
    const L_eq=L_h+L_v+Le_fittings;
    const dp_Pa=calcDP(rho,v,d_m,L_eq,mu_Pas);
    const dp_bar=dp_Pa/1e5;
    const dp_K=dp_bar*dTdp;
    const dpLimit=getDpLimit(t0,L_total);

    // Hydrostatic
    let dp_static_Pa=0;
    if(rho_v_static&&l_v_static>0){
      if(hydroMode==='loss') dp_static_Pa=rho_v_static*9.81*l_v_static;
      else if(hydroMode==='gain') dp_static_Pa=-rho_v_static*9.81*l_v_static;
    }

    const vOkH = v>=vmin_h&&v<=vmax;
    const vOkV = vmin_v<=0||L_v<=0||v>=vmin_v;
    const dpOk = dp_K<=dpLimit;
    const notTooFast = v<=vmax;

    if(!notTooFast) continue;

    let prio;
    if(vOkH&&vOkV&&dpOk) prio=1;
    else if(vOkH&&vOkV&&!dpOk) prio=2;
    else if(!vOkH&&notTooFast&&v<vmin_h&&vOkV&&dpOk) prio=3;
    else if(L_v>0&&vmin_v>0&&v<vmin_v) prio=4;
    else prio=5;

    candidates.push({i,prio,v,dp_K,dp_bar,dp_Pa,L_eq,dpLimit,dp_static_Pa});
  }

  // Select best by priority (lowest prio number, then smallest pipe)
  candidates.sort((a,b)=>a.prio-b.prio||a.i-b.i);

  let autoIdx=-1;
  if(candidates.length>0) autoIdx=candidates[0].i;
  else autoIdx=PIPES.length-1;

  // Apply offset
  let selIdx=autoIdx+offset;
  selIdx=Math.max(0,Math.min(PIPES.length-1,selIdx));

  // Recalculate for selected
  const [od,id]=PIPES[selIdx];
  const d_m=id/1000;
  const A=Math.PI*d_m*d_m/4;
  const v=mdot/(rho*A);
  const Le_fittings=(n_bend*bendFac+n_av*avFac+n_mv*mvFac)*d_m;
  const L_eq=L_h+L_v+Le_fittings;
  const dp_Pa=calcDP(rho,v,d_m,L_eq,mu_Pas);
  const dp_bar=dp_Pa/1e5;
  const dp_K=dp_bar*dTdp;
  const dpLimit=getDpLimit(t0,L_total);

  let dp_static_Pa=0;
  if(rho_v_static&&l_v_static>0){
    if(hydroMode==='loss') dp_static_Pa=rho_v_static*9.81*l_v_static;
    else if(hydroMode==='gain') dp_static_Pa=-rho_v_static*9.81*l_v_static;
  }

  const vOkH=v>=vmin_h&&v<=vmax;
  const vOkV=vmin_v<=0||L_v<=0||v>=vmin_v;
  const dpOk=dp_K<=dpLimit;
  const needsDSR=L_v>0&&vmin_v>0&&v<vmin_v;

  let status;
  if(needsDSR) status='dsr';
  else if(!vOkH&&v<vmin_h) status='vlow';
  else if(!dpOk) status='dpwarn';
  else status='ok';

  const bestCand=candidates[0]||{i:autoIdx};

  return {
    pipeIdx:selIdx, autoIdx:bestCand.i, od, id, d_m, v, L_eq, dp_bar, dp_K, dpLimit,
    dp_static_Pa, status, vOkH, vOkV, dpOk, needsDSR
  };
}

function calculate(){
  syncFL();
  const refKey=gs('refrigerant');
  const ref=REFDATA[refKey];
  const t0=gv('t0');
  const tc=gv('tc');
  const Q0=gv('Q0');
  const gzf=gv('gzf');
  const T_amb=gv('tamb');
  const RH=gv('rh');

  const props0=interpRefrig(ref.data,t0);
  const propsc=interpRefrig(ref.data,tc);

  const p0=props0[1], pc=propsc[1];
  const rho_v0=props0[2], rho_l0=props0[3], hfg0=props0[4], mu_v0=props0[5]*1e-6, dTdp0=props0[6];
  const rho_vc=propsc[2], rho_lc=propsc[3], hfg_c=propsc[4], mu_vc=propsc[5]*1e-6, dTdpc=propsc[6];

  const mdot=Q0*gzf/hfg0;

  // SL
  const l_SL_h=gv('l_SL_h'), l_SL_v=gv('l_SL_v');
  const n_b_SL=gi('n_b_SL'), n_av_SL=gi('n_av_SL'), n_mv_SL=gi('n_mv_SL');
  const isTK=t0<=-10;
  const vmin_SL_h=isTK?4.0:3.5, vmin_SL_v=isTK?8.0:7.0;
  const SL_total=l_SL_h+l_SL_v;

  const SLres=selectPipe(mdot,rho_v0,mu_v0,l_SL_h,l_SL_v,n_b_SL,n_av_SL,n_mv_SL,
    vmin_SL_h,vmin_SL_v,15,true,SL_total,t0,dTdp0,rho_v0,l_SL_v,'loss',pipeOffset.SL);

  // DL - superheat correction: rho_v at tc * 0.75
  const rho_DL=rho_vc*0.75;
  const l_DL_h=gv('l_DL_h'), l_DL_v=gv('l_DL_v');
  const n_b_DL=gi('n_b_DL'), n_av_DL=gi('n_av_DL'), n_mv_DL=gi('n_mv_DL');
  const DL_total=l_DL_h+l_DL_v;
  const DLres=selectPipe(mdot,rho_DL,mu_vc,l_DL_h,l_DL_v,n_b_DL,n_av_DL,n_mv_DL,
    5.0,8.0,20,true,DL_total,tc,dTdpc,rho_DL,l_DL_v,'loss',pipeOffset.DL);

  // FL
  const l_FL_h=gv('l_FL_h'), l_FL_v=gv('l_FL_v');
  const n_b_FL=gi('n_b_FL'), n_av_FL=gi('n_av_FL'), n_mv_FL=gi('n_mv_FL');
  const FL_total=l_FL_h+l_FL_v;
  const fl_dir=document.querySelector('input[name=fl_dir]:checked').value;
  const hydroFL=fl_dir==='up'?'loss':'gain';
  const FLres=selectPipe(mdot,rho_lc,mu_vc*0.3,l_FL_h,l_FL_v,n_b_FL,n_av_FL,n_mv_FL,
    0.3,-1,2.5,false,FL_total,tc,dTdpc,rho_lc,l_FL_v,hydroFL,pipeOffset.FL);

  // KL
  const l_KL=gv('l_KL'), n_b_KL=gi('n_b_KL');
  const KLres=selectPipe(mdot,rho_lc,mu_vc*0.3,l_KL,0,n_b_KL,0,0,
    0.3,-1,2.5,false,l_KL,tc,dTdpc,0,0,null,pipeOffset.KL);

  // Insulation
  const insSL=calcInsulation(SLres.od,t0,T_amb,RH);
  const insDL=calcInsulation(DLres.od,tc,T_amb,RH);
  const insFL=calcInsulation(FLres.od,tc,T_amb,RH);

  lastResult={refKey,ref,t0,tc,Q0,gzf,T_amb,RH,p0,pc,mdot,
    rho_v0,rho_vc,rho_lc,rho_DL,hfg0,dTdp0,dTdpc,mu_v0,
    SLres,DLres,FLres,KLres,
    l_SL_h,l_SL_v,l_DL_h,l_DL_v,l_FL_h,l_FL_v,l_KL,
    fl_dir,insSL,insDL,insFL,isTK,
    vmin_SL_h,vmin_SL_v};

  renderResults();
}

function renderResults(){
  const r=lastResult;
  const el=document.getElementById('resultSection');
  el.classList.add('visible');

  const cards=document.getElementById('resultCards');
  const wTop=document.getElementById('warningsTop');
  const wBot=document.getElementById('warningsBottom');
  cards.innerHTML='';
  wTop.innerHTML='';
  wBot.innerHTML='';

  // Top warnings
  if(r.ref.isCO2){
    wTop.innerHTML+=`<div class="warning-box red">⚠ R744 CO₂: K65-Druckklasse erforderlich! Max. Betriebsdruck: ${r.ref.maxP} bar · Betriebsdruck p₀=${r.p0.toFixed(1)} bar / pc=${r.pc.toFixed(1)} bar</div>`;
  }
  if(r.ref.isA2L){
    wTop.innerHTML+=`<div class="warning-box orange">⚠ A2L Kältemittel (${r.refKey}): Sicherheitsvorschriften beachten (EN 378)</div>`;
  }

  // Render line cards
  cards.innerHTML+=renderLineCard('SL','SAUGLEITUNG',r.SLres,r.mdot,r.rho_v0,r.p0,r.pc,r.l_SL_h,r.l_SL_v,r.vmin_SL_h,r.vmin_SL_v,15,r.dTdp0,r.insSL,r.t0,true,'loss');
  cards.innerHTML+=renderLineCard('DL','DRUCKLEITUNG',r.DLres,r.mdot,r.rho_DL,r.p0,r.pc,r.l_DL_h,r.l_DL_v,5.0,8.0,20,r.dTdpc,r.insDL,r.tc,true,'loss');
  cards.innerHTML+=renderLineCard('FL','FLÜSSIGKEITSLEITUNG',r.FLres,r.mdot,r.rho_lc,r.p0,r.pc,r.l_FL_h,r.l_FL_v,0.3,-1,2.5,r.dTdpc,r.insFL,r.tc,false,r.fl_dir==='up'?'loss':'gain');
  cards.innerHTML+=renderLineCard('KL','KONDENSATLEITUNG',r.KLres,r.mdot,r.rho_lc,r.p0,r.pc,r.l_KL,0,0.3,-1,2.5,r.dTdpc,null,r.tc,false,null);

  // Bottom warnings
  let wBotHTML='';
  if(r.SLres.needsDSR||r.DLres.needsDSR)
    wBotHTML+=`<div class="warning-box orange">⚠ Doppel-Steigrohr (DSR) für Ölrückführung erforderlich</div>`;
  if(r.SLres.status==='dpwarn'||r.DLres.status==='dpwarn'||r.FLres.status==='dpwarn'||r.KLres.status==='dpwarn')
    wBotHTML+=`<div class="warning-box red">⚠ Druckverlust überschritten – Rohr eine Stufe größer wählen</div>`;
  wBot.innerHTML=wBotHTML;

  // Attach event listeners after render
  attachEvents();
}

function renderLineCard(lineType,title,res,mdot,rho,p0,pc,l_h,l_v,vmin_h,vmin_v,vmax,dTdp,ins,Tpipe,gasLine,hydroMode){
  const r=lastResult;
  const {od,id,v,L_eq,dp_bar,dp_K,dpLimit,dp_static_Pa,status,needsDSR}=res;

  let statusBadge='';
  let cardClass='ok';
  if(status==='ok') { statusBadge=`<span class="badge badge-ok">✓ OK</span>`; cardClass='ok';}
  else if(status==='dpwarn') { statusBadge=`<span class="badge badge-warn">⚠ Druckverl.</span>`; cardClass='warn';}
  else if(status==='dsr'||status==='vlow') { statusBadge=`<span class="badge badge-warn">⚠ Ölrückf. (DSR empf.)</span>`; cardClass='warn';}
  else { statusBadge=`<span class="badge badge-error">✗ Fehler</span>`; cardClass='error';}

  const vPct=Math.min(100,v/vmax*100);
  const vminHPct=vmin_h/vmax*100;
  const vminVPct=vmin_v>0?vmin_v/vmax*100:0;
  const barColor=v>vmax?'error':(v<vmin_h&&l_h>0)?'warn':(vmin_v>0&&l_v>0&&v<vmin_v)?'warn':'ok';

  let velStatus='OK';
  if(v>vmax) velStatus='ZU HOCH';
  else if(vmin_v>0&&l_v>0&&v<vmin_v) velStatus='ZU NIEDRIG (Ölrückf.)';
  else if(v<vmin_h&&l_h>0) velStatus='ZU NIEDRIG';

  const dpStatusStr=dp_K<=dpLimit?`<span class="dp-ok">OK</span>`:`<span class="dp-error">ÜBERSCHRITTEN</span>`;

  let hydroHTML='';
  if(l_v>0&&hydroMode){
    const dp_static_bar=dp_static_Pa/1e5;
    if(hydroMode==='loss'){
      hydroHTML=`<div class="result-row"><span class="hydro-loss">Hydrostatischer Δp = ${dp_static_bar.toFixed(3)} bar (Verlust ↑)</span></div>`;
    } else {
      const gain=Math.abs(dp_static_Pa)/1e5;
      hydroHTML=`<div class="result-row"><span class="hydro-gain">Hydrostatischer Δp = ${gain.toFixed(3)} bar (Gewinn ↓)</span></div>`;
    }
  }

  const insHTML=ins?`<div class="result-row">Isolierung: <span>${ins.thickness} mm Armaflex</span> (Taupunkt: ${ins.T_dp.toFixed(1)}°C)</div>`:'';

  // Auto badge
  const autoOD=PIPES[res.autoIdx][0];
  const prevPipeIdx=res.pipeIdx-1>=0?res.pipeIdx-1:-1;
  const nextPipeIdx=res.pipeIdx+1<PIPES.length?res.pipeIdx+1:-1;
  const prevLabel=prevPipeIdx>=0?`Ø${PIPES[prevPipeIdx][0]}mm`:'–';
  const nextLabel=nextPipeIdx>=0?`Ø${PIPES[nextPipeIdx][0]}mm`:'–';

  const autoLabel=pipeOffset[lineType]===0?`AUTO Ø${autoOD}mm ▼`:`Ø${od}mm`;
  const manLabel=pipeOffset[lineType]!==0?`<span class="override-manual-label">✎ Manuell: Ø${od}mm (${pipeOffset[lineType]>0?'+':''}${pipeOffset[lineType]} Stufen vs. Auto)</span>`:'';

  const dsrSection=needsDSR?renderDSRSection(lineType,mdot,rho,lastResult.dTdp0,l_v,lastResult):'';

  return `
<div class="result-card ${cardClass}" id="card_${lineType}">
  <div class="result-header">
    <div>
      <span class="result-title">${title}</span>
      <span class="pipe-badge">Ø${od}mm / ID ${id}mm</span>
    </div>
    <div>${statusBadge}</div>
  </div>
  <div class="result-row">
    ṁ = <span>${mdot.toFixed(4)} kg/s</span> &nbsp;|&nbsp;
    ρ = <span>${rho.toFixed(1)} kg/m³</span> &nbsp;|&nbsp;
    L_eq = <span>${L_eq.toFixed(1)} m</span>
  </div>
  <div class="result-row">
    Betriebsdruck p₀ = <span>${p0.toFixed(1)} bar</span> &nbsp;|&nbsp;
    pc = <span>${pc.toFixed(1)} bar</span>
  </div>
  <div style="margin:10px 0">
    <div class="vel-bar-wrap" style="height:22px">
      <div class="vel-bar-bg"></div>
      <div class="vel-bar-fill ${barColor}" style="width:${vPct.toFixed(1)}%;height:22px;position:absolute;top:0;left:0;border-radius:8px"></div>
      ${vmin_h>0?`<div class="vel-marker" style="left:${vminHPct.toFixed(1)}%"><div class="vel-marker-label">vmin_h</div></div>`:''}
      ${vmin_v>0&&l_v>0?`<div class="vel-marker" style="left:${vminVPct.toFixed(1)}%;background:#e74c3c"><div class="vel-marker-label" style="color:#e74c3c">vmin_v</div></div>`:''}
    </div>
    <div class="vel-info">
      v = <strong>${v.toFixed(2)} m/s</strong> &nbsp;|&nbsp;
      vmin_h = ${vmin_h} m/s &nbsp;|&nbsp;
      ${vmin_v>0?`vmin_v = ${vmin_v} m/s &nbsp;|&nbsp;`:''}
      vmax = ${vmax} m/s &nbsp;|&nbsp;
      Status: <strong>${velStatus}</strong>
    </div>
  </div>
  <div class="dp-info">
    Δp = <strong>${dp_K.toFixed(2)} K</strong> (max ${dpLimit.toFixed(1)} K) &nbsp;|&nbsp;
    Δp = ${dp_bar.toFixed(4)} bar &nbsp;|&nbsp;
    ${dpStatusStr}
  </div>
  ${hydroHTML}

  <div class="override-row">
    <button onclick="adjustPipe('${lineType}',-1)" ${res.pipeIdx<=0?'disabled':''}>−</button>

    <span class="override-adj">${nextLabel}</span>

}

function calcDSRHTML(lineType, mdot, rho, l_v, f_pct, r){
  const f=f_pct/100;
  const mdot_sr=mdot*f;
  const isTK=r.isTK;
  const vmin_v=isTK?8.0:7.0;
  const vmax=15;

  // Speed Riser: smallest pipe where v(mdot_sr) >= vmin_v
  let sr_idx=-1;
  for(let i=0;i<PIPES.length;i++){
    const [od,id]=PIPES[i];
    const A=Math.PI*(id/1000)*(id/1000)/4;
    const v=mdot_sr/(rho*A);
    if(v>=vmin_v&&v<=vmax){sr_idx=i;break;}
  }
  if(sr_idx<0) sr_idx=0;

  const [sr_od,sr_id]=PIPES[sr_idx];
  const A_sr=Math.PI*(sr_id/1000)*(sr_id/1000)/4;
  const v_sr_tl=mdot_sr/(rho*A_sr);
  const v_sr_fl=mdot/(rho*A_sr);

  // Main Riser
  const v_target=(vmin_v+vmax)/2;
  const A_total=mdot/(rho*v_target);
  const A_mr_needed=A_total-A_sr;

  let mr_idx=-1;
  for(let i=0;i<PIPES.length;i++){
    if(i===sr_idx) continue;
    const [od,id]=PIPES[i];
    const A=Math.PI*(id/1000)*(id/1000)/4;
    if(A>=A_mr_needed){mr_idx=i;break;}
  }
  if(mr_idx<0) mr_idx=PIPES.length-1;
  if(mr_idx===sr_idx) mr_idx=Math.min(sr_idx+1,PIPES.length-1);

  const [mr_od,mr_id]=PIPES[mr_idx];
  const A_mr=Math.PI*(mr_id/1000)*(mr_id/1000)/4;
  const v_combined=mdot/(rho*(A_sr+A_mr));

  return `
<div style="margin-top:12px;font-size:14px">
  <div style="margin-bottom:8px"><strong>Speed Riser:</strong> Ø${sr_od}mm / ID ${sr_id}mm</div>
  <div style="margin-bottom:4px;color:#555">v_Teillast = ${v_sr_tl.toFixed(1)} m/s (≥ vmin=${vmin_v} m/s) ${v_sr_tl>=vmin_v?'<span style="color:#27ae60">✓</span>':'<span style="color:#e74c3c">✗</span>'}</div>

  </div>
</div>`;
}

function toggleDSR(lineType){
  const el=document.getElementById(`dsr_${lineType}`);
  el.classList.toggle('open');
}

function showSchema(lineType, idx, btn){
  const tabs=document.querySelectorAll(`#schemaTabs_${lineType} .schema-tab`);
  tabs.forEach((t,i)=>t.classList.toggle('active',i===idx));
  for(let i=0;i<4;i++){
    const p=document.getElementById(`schema_${lineType}_${i}`);
    if(p) p.classList.toggle('active',i===idx);
  }
}

function updateDSR(lineType, val){
  dsrTeillast[lineType]=parseInt(val);
  document.getElementById(`dsrFVal_${lineType}`).textContent=val+'%';
  const r=lastResult;
  let mdot,rho,l_v;
  if(lineType==='SL'){mdot=r.mdot;rho=r.rho_v0;l_v=r.l_SL_v;}
  else if(lineType==='DL'){mdot=r.mdot;rho=r.rho_DL;l_v=r.l_DL_v;}
  document.getElementById(`dsrCalc_${lineType}`).innerHTML=calcDSRHTML(lineType,mdot,rho,l_v,parseInt(val),r);
}

function adjustPipe(lineType, delta){
  pipeOffset[lineType]=(pipeOffset[lineType]||0)+delta;
  renderResults();
}
