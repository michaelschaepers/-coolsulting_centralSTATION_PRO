<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WP Quick-Kalkulator – Heizlast nach Verbrauch</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Helvetica,Arial,sans-serif;background:#36A9E1;min-height:100vh;padding:20px;color:#3C3C3B}
h1{font-size:36px;font-weight:bold;color:#3C3C3B;margin-bottom:2px}
.subtitle{color:rgba(255,255,255,0.85);font-size:16px;margin-bottom:6px}
.quickie-label{font-family:'Arial Rounded MT Bold','Arial Black',sans-serif;font-size:48px;font-weight:bold;color:#fff;text-align:right;margin-top:-50px;position:relative;z-index:10;opacity:0.9}
.header-area{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.header-left{flex:2}
.header-right{flex:1;text-align:right;min-width:150px}
.header-right img{max-width:180px}

.card{background:#fff;border-radius:12px;box-shadow:0 4px 18px rgba(0,0,0,0.13);padding:24px;margin-bottom:20px}
.card h2{color:#3C3C3B;font-size:18px;margin-bottom:16px;border-bottom:2px solid #36A9E1;padding-bottom:8px}
label{display:block;font-size:13px;color:#3C3C3B;margin-bottom:4px;font-weight:600}
input[type=number],select{width:100%;padding:9px 12px;border:2px solid #d0d0d0;border-radius:8px;font-size:15px;font-weight:bold;color:#36A9E1;outline:none;transition:border 0.2s;background:#fff}
input[type=number]:focus,select:focus{border-color:#36A9E1}
input[type=checkbox]{width:18px;height:18px;accent-color:#36A9E1;vertical-align:middle;margin-right:6px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.form-group{margin-bottom:14px}

.tabs{display:flex;gap:0;margin-bottom:0}
.tab-btn{flex:1;padding:14px 20px;font-size:16px;font-weight:bold;border:none;cursor:pointer;transition:all 0.2s;border-radius:12px 12px 0 0;color:#fff;background:rgba(255,255,255,0.25)}
.tab-btn.active{background:#fff;color:#3C3C3B}
.tab-btn:hover:not(.active){background:rgba(255,255,255,0.4)}
.tab-content{display:none}
.tab-content.active{display:block}

.btn-calc{background:#3C3C3B;color:#fff;border:none;border-radius:10px;padding:14px 40px;font-size:18px;font-weight:bold;cursor:pointer;width:100%;margin-top:18px;letter-spacing:1px;transition:background 0.2s}
.btn-calc:hover{background:#555}

.result-area{display:none;margin-top:20px}
.result-area.visible{display:block}
.result-box{background:rgba(255,255,255,0.95);border-radius:12px;padding:24px;border-left:10px solid #3C3C3B;box-shadow:0 4px 14px rgba(0,0,0,0.1);margin-bottom:20px}
.result-highlight{font-size:40px;font-weight:bold;color:#36A9E1}
.result-label{font-size:16px;color:#3C3C3B;margin-bottom:4px}
.rechenweg{background:rgba(0,0,0,0.15);padding:12px 16px;border-radius:8px;color:#fff;font-family:'Courier New',monospace;font-size:14px;margin-top:12px;line-height:1.6}
.energy-info{color:#fff;margin-top:14px;font-size:15px;line-height:1.6}
.energy-info b{color:#fff}

.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.chart-title{color:#fff;text-align:center;font-weight:bold;font-size:15px;margin-bottom:6px}

.slider-container{position:relative;margin-bottom:14px}
.slider-container input[type=range]{width:100%;accent-color:#36A9E1;height:6px}
.slider-value{display:inline-block;background:#36A9E1;color:#fff;border-radius:6px;padding:2px 10px;font-size:13px;font-weight:bold;margin-left:8px}
.radio-group{display:flex;gap:16px;margin-top:4px;margin-bottom:14px}
.radio-group label{display:inline-flex;align-items:center;font-weight:normal;cursor:pointer;font-size:14px}
.radio-group input[type=radio]{accent-color:#36A9E1;margin-right:5px;width:16px;height:16px}
.info-hint{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
.divider{border:none;border-top:2px solid rgba(255,255,255,0.3);margin:20px 0}

.footer{text-align:center;color:rgba(255,255,255,0.5);font-size:11px;margin-top:30px}

@media(max-width:700px){
  .grid-2,.result-grid{grid-template-columns:1fr}
  .quickie-label{font-size:32px;margin-top:-30px}
  h1{font-size:28px}
  .header-area{flex-direction:column}
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header-area">
  <div class="header-left">
    <h1>WP Quick-Kalkulator</h1>
    <div class="subtitle">Heizlast-Ermittlung nach Verbrauch &middot; coolsulting</div>
  </div>
  <div class="header-right">
    <div class="quickie-label">Quickie</div>
  </div>
</div>

<hr class="divider">

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('gas')">&#128293; GAS-ERSATZ</button>
  <button class="tab-btn" onclick="switchTab('oil')">&#128738; &Ouml;L-ERSATZ</button>
</div>

<!-- GAS TAB -->
<div id="tab-gas" class="tab-content active">
  <div class="card" style="border-radius:0 0 12px 12px">
    <div class="grid-2">
      <div>
        <div class="form-group">
          <label>Jahresverbrauch Gas</label>
          <input type="number" id="gas-verbrauch" value="25000" min="1000" max="200000" step="500">
        </div>
        <div class="form-group">
          <label>Einheit</label>
          <div class="radio-group">
            <label><input type="radio" name="gas-einheit" value="kWh" checked> kWh</label>
            <label><input type="radio" name="gas-einheit" value="m3"> m&sup3;</label>
          </div>
        </div>
        <div class="form-group">
          <label>Wirkungsgrad Altkessel: <span class="slider-value" id="gas-wirk-val">85%</span></label>
          <input type="range" id="gas-wirk" min="60" max="105" value="85" oninput="document.getElementById('gas-wirk-val').textContent=this.value+'%'">
        </div>
      </div>
      <div>
        <div class="form-group">
          <label><b>Warmwasser-Einstellungen</b></label>
          <div style="margin-top:8px">
            <label style="font-weight:normal;cursor:pointer">
              <input type="checkbox" id="gas-ww" checked onchange="toggleGasWW()"> Warmwasser &uuml;ber Gasheizung?
            </label>
          </div>
        </div>
        <div id="gas-ww-options">
          <div class="form-group">
            <label>Personen im Haushalt: <span class="slider-value" id="gas-pers-val">3</span></label>
            <input type="range" id="gas-pers" min="1" max="6" value="3" oninput="document.getElementById('gas-pers-val').textContent=this.value">
          </div>
          <div class="info-hint">Formel: 1,45 kWh &times; 2 &times; <span id="gas-pers-hint">3</span> Pers.</div>
        </div>
      </div>
    </div>
    <button class="btn-calc" onclick="calcGas()">BERECHNUNG STARTEN (GAS)</button>
  </div>
</div>

<!-- OIL TAB -->
<div id="tab-oil" class="tab-content">
  <div class="card" style="border-radius:0 0 12px 12px">
    <div class="grid-2">
      <div>
        <div class="form-group">
          <label>Jahresverbrauch &Ouml;l (Liter)</label>
          <input type="number" id="oil-verbrauch" value="2500" min="500" max="20000" step="100">
        </div>
        <div class="form-group">
          <label>Wirkungsgrad Altkessel: <span class="slider-value" id="oil-wirk-val">80%</span></label>
          <input type="range" id="oil-wirk" min="60" max="105" value="80" oninput="document.getElementById('oil-wirk-val').textContent=this.value+'%'">
        </div>
      </div>
      <div>
        <div class="form-group">
          <label><b>Warmwasser-Einstellungen</b></label>
          <div style="margin-top:8px">
            <label style="font-weight:normal;cursor:pointer">
              <input type="checkbox" id="oil-ww" checked onchange="toggleOilWW()"> Warmwasser &uuml;ber &Ouml;lheizung?
            </label>
          </div>
        </div>
        <div id="oil-ww-options">
          <div class="form-group">
            <label>Personen im Haushalt: <span class="slider-value" id="oil-pers-val">3</span></label>
            <input type="range" id="oil-pers" min="1" max="6" value="3" oninput="document.getElementById('oil-pers-val').textContent=this.value">
          </div>
          <div class="info-hint">Formel: 1,45 kWh &times; 2 &times; <span id="oil-pers-hint">3</span> Pers.</div>
        </div>
      </div>
    </div>
    <button class="btn-calc" onclick="calcOil()">BERECHNUNG STARTEN (&Ouml;L)</button>
  </div>
</div>

<!-- RESULT AREA (shared) -->
<div id="result-area" class="result-area">
  <hr class="divider">
  <div class="result-grid">
    <div>
      <div class="result-box">
        <div class="result-label">Empfohlene Heizlast:</div>
        <div class="result-highlight" id="res-heizlast">– kW</div>
      </div>
      <div class="rechenweg" id="res-rechenweg"></div>
      <div class="energy-info" id="res-energy"></div>
    </div>
    <div>
      <div class="chart-title">Verbrauchs-Aufteilung</div>
      <div id="chart-pie" style="width:100%;height:320px;background:rgba(255,255,255,0.08);border-radius:12px"></div>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  &copy; coolsulting e.U. &middot; WP Quick-Kalkulator v4.2 &middot; HTML-Standalone
</div>

<script>
// === TAB SWITCHING ===
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b,i){ b.classList.toggle('active', i===(tab==='gas'?0:1)); });
  document.getElementById('tab-gas').classList.toggle('active', tab==='gas');
  document.getElementById('tab-oil').classList.toggle('active', tab==='oil');
  document.getElementById('result-area').classList.remove('visible');
}

// === WARMWATER TOGGLE ===
function toggleGasWW() {
  document.getElementById('gas-ww-options').style.display = document.getElementById('gas-ww').checked ? 'block' : 'none';
}
function toggleOilWW() {
  document.getElementById('oil-ww-options').style.display = document.getElementById('oil-ww').checked ? 'block' : 'none';
}

// === PERSONEN HINT UPDATE ===
document.getElementById('gas-pers').addEventListener('input', function(){ document.getElementById('gas-pers-hint').textContent = this.value; });
document.getElementById('oil-pers').addEventListener('input', function(){ document.getElementById('oil-pers-hint').textContent = this.value; });

// === CORE CALCULATION (identical to Python logic) ===
function calculateHeizlast(verbrauchKwh, wirkungsgrad, hatWW, personen) {
  var verlustKwh = verbrauchKwh * (1 - wirkungsgrad);
  var nutzenergieGesamt = verbrauchKwh * wirkungsgrad;

  var wwAnteil = 0;
  var heizstunden = 2000;

  if (hatWW) {
    wwAnteil = personen * (1.45 * 2.0) * 365;
    heizstunden = 2400;
  }

  var heizenPur = nutzenergieGesamt - wwAnteil;
  if (heizenPur < 0) {
    return { error: true, msg: 'Fehler: Warmwasseranteil > Gesamtverbrauch' };
  }

  var heizlast = heizenPur / heizstunden;
  var rechenweg = '(' + fmt(verbrauchKwh) + ' kWh &times; ' + wirkungsgrad.toFixed(2) + ' &minus; ' + fmt(wwAnteil) + ' kWh [WW]) / ' + heizstunden + ' h = ' + heizlast.toFixed(2) + ' kW';

  return {
    error: false,
    heizlast: heizlast,
    heizenergie: heizenPur,
    wwAnteil: wwAnteil,
    verlust: verlustKwh,
    rechenweg: rechenweg
  };
}

// === NUMBER FORMATTING ===
function fmt(n) { return Math.round(n).toLocaleString('de-DE'); }

// === DISPLAY RESULTS ===
function showResult(r, inputKwh) {
  if (r.error) { alert(r.msg); return; }

  document.getElementById('res-heizlast').textContent = r.heizlast.toFixed(2) + ' kW';
  document.getElementById('res-rechenweg').innerHTML = '<b>RECHENWEG:</b><br>' + r.rechenweg;

  var genutzt = r.heizenergie + r.wwAnteil;
  var prozent = (genutzt / inputKwh * 100).toFixed(1);
  document.getElementById('res-energy').innerHTML =
    '<b>Energie-Bilanz:</b><br>' +
    'Eingesetzte Energie: ' + fmt(inputKwh) + ' kWh<br>' +
    'Davon genutzt: ' + fmt(genutzt) + ' kWh (' + prozent + '%)';

  // Pie Chart
  var labels = ['Heizw\u00e4rme (Haus)', 'Warmwasser', 'Kessel-Verlust'];
  var values = [r.heizenergie, r.wwAnteil, r.verlust];
  var colors = ['#FF4B4B', '#8B0000', '#D3D3D3'];

  // Remove WW slice if zero
  if (r.wwAnteil <= 0) {
    labels.splice(1, 1);
    values.splice(1, 1);
    colors.splice(1, 1);
  }

  Plotly.newPlot('chart-pie', [{
    type: 'pie',
    labels: labels,
    values: values,
    hole: 0.4,
    sort: false,
    marker: { colors: colors, line: { color: '#FFFFFF', width: 2 } },
    textinfo: 'percent',
    hoverinfo: 'label+percent+value'
  }], {
    showlegend: true,
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    margin: { t: 10, b: 10, l: 10, r: 10 },
    legend: { font: { color: '#fff', size: 13 } }
  }, { responsive: true, displayModeBar: false });

  document.getElementById('result-area').classList.add('visible');
  document.getElementById('result-area').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// === GAS CALCULATION ===
function calcGas() {
  var verbrauch = parseFloat(document.getElementById('gas-verbrauch').value) || 0;
  var einheit = document.querySelector('input[name="gas-einheit"]:checked').value;
  var wirk = parseInt(document.getElementById('gas-wirk').value) / 100;
  var hatWW = document.getElementById('gas-ww').checked;
  var pers = hatWW ? parseInt(document.getElementById('gas-pers').value) : 0;

  var inputKwh = (einheit === 'm3') ? verbrauch * 10.5 : verbrauch;
  var r = calculateHeizlast(inputKwh, wirk, hatWW, pers);
  showResult(r, inputKwh);
}

// === OIL CALCULATION ===
function calcOil() {
  var verbrauch = parseFloat(document.getElementById('oil-verbrauch').value) || 0;
  var wirk = parseInt(document.getElementById('oil-wirk').value) / 100;
  var hatWW = document.getElementById('oil-ww').checked;
  var pers = hatWW ? parseInt(document.getElementById('oil-pers').value) : 0;

  var inputKwh = verbrauch * 10.0;
  var r = calculateHeizlast(inputKwh, wirk, hatWW, pers);
  showResult(r, inputKwh);
}
</script>
</body>
</html>
